<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NURSE - Inicio de Sesión</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d3b66, #1e6091);
        }

        .login-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .logo {
            width: 180px;
            margin-bottom: 20px;
        }

        h2 {
            margin: 10px 0 25px;
            color: #0d3b66;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            border-color: #1e6091;
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #1e6091;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-login:hover {
            background-color: #0d3b66;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Coloca aquí tu logo con el nombre nurse-logo.png en la misma carpeta -->
        <img src="nurse-logo.png" alt="Nurse Logo" class="logo">
        
        <h2>Inicio de Sesión</h2>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" required>
            </div>

            <div class="input-group">
                <label for="rethus">Número RETHUS</label>
                <input type="text" id="rethus" placeholder="Ej: 123456789" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
            <p class="error" id="errorMsg">Por favor completa todos los campos correctamente.</p>
        </form>

        <div class="footer-text">
            NURSE - Tu asistente de chequeo
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const rethus = document.getElementById('rethus').value.trim();
            const password = document.getElementById('password').value.trim();

            if (email === '' || rethus === '' || password === '') {
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            alert('Inicio de sesión exitoso (simulación)');
        });
    </script>

</body>
</html>
